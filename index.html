                ctx.fillText(`Protect the line from advancing ground and air units.`, width / 2, height / 2 - 70);
                
                let layout = getMenuLayout();

                ctx.fillStyle = theme.fg();
                ctx.font = '14px "Courier New"';
                ctx.textAlign = 'left';
                let ctrlX = layout.startX + layout.totalW + 80; 
                let ctrlY = layout.startY + 15;
                ctx.fillText(`[1-3] or [Q] Weapon: Missile, Laser, Gun`, ctrlX, ctrlY);
                ctx.fillText(`[M] Mode: Toggle Target/Charge (RVD Only)`, ctrlX, ctrlY + 25);
                ctx.fillText(`[T] Theme: ${isDark ? 'DARK' : 'LIGHT'}`, ctrlX, ctrlY + 50);
                ctx.fillText(`[P] Pause`, ctrlX, ctrlY + 75);
                ctx.fillText(`[ESC] Abort to Menu`, ctrlX, ctrlY + 100);

                ctx.font = '20px "Courier New"';
                ctx.textAlign = 'center';
                let isAnyHovered = false;
                
                for (let i = 0; i < 10; i++) {
                    let row = Math.floor(i / 5);
                    let col = i % 5;
                    let bx = layout.startX + col * (layout.bw + layout.gap);
                    let by = layout.startY + row * (layout.bh + layout.gap);
                    
                    let isHover = (mouse.x >= bx && mouse.x <= bx + layout.bw && mouse.y >= by && mouse.y <= by + layout.bh);
                    if (isHover) isAnyHovered = true;
                    
                    if (menuSelectedMode === 'MAIN' && selectedStartLevel === i + 1) {
                        ctx.fillStyle = theme.fg();
                        ctx.fillRect(bx, by, layout.bw, layout.bh);
                        ctx.fillStyle = theme.bg();
                    } else if (isHover) {
                        ctx.fillStyle = theme.trail();
                        ctx.fillRect(bx, by, layout.bw, layout.bh);
                        ctx.fillStyle = theme.bg();
                    } else {
                        ctx.strokeStyle = theme.trail();
                        ctx.strokeRect(bx, by, layout.bw, layout.bh);
                        ctx.fillStyle = theme.trail();
                    }
                    ctx.fillText(`L-${i + 1}`, bx + layout.bw / 2, by + layout.bh / 2 + 6);
                }

                let isRvdHover = (mouse.x >= layout.startX && mouse.x <= layout.startX + layout.totalW && mouse.y >= layout.rvdY && mouse.y <= layout.rvdY + layout.bh);
                if (isRvdHover) isAnyHovered = true;
                
                if (menuSelectedMode === 'RVD') {
                    ctx.fillStyle = theme.fg();
                    ctx.fillRect(layout.startX, layout.rvdY, layout.totalW, layout.bh);
                    ctx.fillStyle = theme.bg();
                } else if (isRvdHover) {
                    ctx.fillStyle = theme.trail();
                    ctx.fillRect(layout.startX, layout.rvdY, layout.totalW, layout.bh);
                    ctx.fillStyle = theme.bg();
                } else {
                    ctx.strokeStyle = theme.trail();
                    ctx.strokeRect(layout.startX, layout.rvdY, layout.totalW, layout.bh);
                    ctx.fillStyle = theme.trail();
                }
                
                let cursor = (menuSelectedMode === 'RVD' && Math.floor(Date.now() / 500) % 2 === 0) ? '_' : '';
                ctx.fillText(`ROCKETS VS DRONES [WAVE: ${rvdStartWaveStr}${cursor}]`, layout.startX + layout.totalW / 2, layout.rvdY + layout.bh / 2 + 6);

                ctx.fillStyle = theme.fg();
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillText('PRESS [SPACE] OR [ENTER] TO LAUNCH', width / 2, layout.rvdY + layout.bh + 50);
                }
            } else if (gameState === 'PAUSED') {
                ctx.fillStyle = theme.overlay();
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = theme.fg();
                ctx.textAlign = 'center';
                ctx.font = '50px "Courier New"';
                ctx.fillText('MISSION PAUSED', width / 2, height / 2);
                ctx.font = '20px "Courier New"';
                ctx.fillText(`PRESS 'P' TO RESUME`, width / 2, height / 2 + 50);
                ctx.fillText(`PRESS 'ESC' TO ABORT`, width / 2, height / 2 + 80);
            } else if (gameState === 'GAME_OVER') {
                ctx.fillStyle = theme.overlay();
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = theme.fg();
                ctx.textAlign = 'center';
                ctx.font = '50px "Courier New"';
                ctx.fillText('BASE OVERRUN', width / 2, height / 2 - 20);
                ctx.fillStyle = theme.trail();
                ctx.font = '20px "Courier New"';
                ctx.fillText(`WAVE REACHED: ${level}`, width / 2, height / 2 + 30);
                ctx.fillStyle = theme.fg();
                ctx.fillText('CLICK TO RETRY WAVE', width / 2, height / 2 + 70);
                ctx.font = '16px "Courier New"';
                ctx.fillText('[ESC] ABORT TO MENU', width / 2, height / 2 + 100);
            } else if (gameState === 'GAME_CLEARED') {
                ctx.fillStyle = theme.overlay();
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = theme.fg();
                ctx.textAlign = 'center';
                ctx.font = '50px "Courier New"';
                ctx.fillText('MISSION ACCOMPLISHED', width / 2, height / 2 - 20);
                ctx.fillStyle = theme.trail();
                ctx.font = '20px "Courier New"';
                ctx.fillText(`ALL WAVES CLEARED`, width / 2, height / 2 + 30);
                ctx.fillStyle = theme.fg();
                ctx.fillText('CLICK TO RETURN TO MENU', width / 2, height / 2 + 70);
            } else if (gameState === 'PLAYING' && isIntermission) {
                ctx.fillStyle = theme.fg();
                ctx.textAlign = 'center';
                ctx.font = '40px "Courier New"';
                ctx.fillText(`WAVE ${level} COMPLETED`, width / 2, height / 2);
                if (Math.floor(frameCount / 10) % 2 === 0) {
                    ctx.font = '20px "Courier New"';
                    ctx.fillText(`PREPARING NEXT WAVE...`, width / 2, height / 2 + 40);
                }
            }
        }

        function gameLoop() {
            updateCursor();
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        gameLoop();
    </script>
</body>
</html>
