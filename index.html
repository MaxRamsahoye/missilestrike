<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missile Strike</title>
    <!-- Rocket Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 10 Q70 30 65 70 L80 90 L50 80 L20 90 L35 70 Q30 30 50 10 Z' fill='red'/></svg>">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            border: none;
            cursor: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Web Audio API Synthesizer System
        const sfx = {
            ctx: null,
            noiseBuffer: null,
            init() {
                if (this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                const bufferSize = this.ctx.sampleRate;
                this.noiseBuffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = this.noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
            },
            playMG() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(80, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.1);
            },
            playLaser() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(900, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playMissile() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
                
                const noiseSrc = this.ctx.createBufferSource();
                noiseSrc.buffer = this.noiseBuffer;
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.03, this.ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                noiseSrc.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                noiseSrc.start();
                osc.stop(this.ctx.currentTime + 0.4);
                noiseSrc.stop(this.ctx.currentTime + 0.3);
            },
            playTripleMissile() {
                if (!this.ctx) return;
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(500, this.ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.3);
                        gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start();
                        osc.stop(this.ctx.currentTime + 0.3);
                    }, i * 60);
                }
            },
            playSwarmLaunch() {
                if (!this.ctx) return;
                
                // Deep initial boom/rumble
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(60, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 1.5);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
                
                // Heavy noise thrust
                const noiseSrc = this.ctx.createBufferSource();
                noiseSrc.buffer = this.noiseBuffer;
                const noiseFilter = this.ctx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.setValueAtTime(800, this.ctx.currentTime);
                noiseFilter.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 1.5);
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.5);
                
                noiseSrc.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                noiseSrc.start();
                osc.stop(this.ctx.currentTime + 1.5);
                noiseSrc.stop(this.ctx.currentTime + 1.5);
            },
            playHoming() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            },
            playExplosion(size) {
                if (!this.ctx) return;
                const dur = Math.min(0.6, size / 60); 
                
                const noiseSrc = this.ctx.createBufferSource();
                noiseSrc.buffer = this.noiseBuffer;
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000 - Math.min(800, size * 10), this.ctx.currentTime);
                
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                
                noiseSrc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noiseSrc.start();
                noiseSrc.stop(this.ctx.currentTime + dur);
                
                const osc = this.ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(120 - Math.min(80, size), this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + dur);
                const oscGain = this.ctx.createGain();
                oscGain.gain.setValueAtTime(0.4, this.ctx.currentTime);
                oscGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
                osc.connect(oscGain);
                oscGain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + dur);
            },
            playAlert() {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            },
            playLevelUp() {
                 if (!this.ctx) return;
                 const freqs = [300, 400, 500, 600];
                 freqs.forEach((f, i) => {
                     const osc = this.ctx.createOscillator();
                     const gain = this.ctx.createGain();
                     osc.type = 'sine';
                     osc.frequency.value = f;
                     gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.1);
                     gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + i * 0.1 + 0.05);
                     gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + i * 0.1 + 0.1);
                     osc.connect(gain);
                     gain.connect(this.ctx.destination);
                     osc.start(this.ctx.currentTime + i * 0.1);
                     osc.stop(this.ctx.currentTime + i * 0.1 + 0.1);
                 });
            },
            playGameOver() {
                if (!this.ctx) return;
                 const freqs = [300, 250, 200, 150];
                 freqs.forEach((f, i) => {
                     const osc = this.ctx.createOscillator();
                     const gain = this.ctx.createGain();
                     osc.type = 'sawtooth';
                     osc.frequency.value = f;
                     gain.gain.setValueAtTime(0, this.ctx.currentTime + i * 0.2);
                     gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + i * 0.2 + 0.1);
                     gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + i * 0.2 + 0.2);
                     osc.connect(gain);
                     gain.connect(this.ctx.destination);
                     osc.start(this.ctx.currentTime + i * 0.2);
                     osc.stop(this.ctx.currentTime + i * 0.2 + 0.2);
                 });
            }
        };

        // Theme System
        let isDark = true;
        const theme = {
            bg: () => isDark ? '#000' : '#fff',
            bgTrail: () => isDark ? 'rgba(0, 0, 0, 0.4)' : 'rgba(255, 255, 255, 0.4)',
            fg: () => isDark ? '#fff' : '#000',
            ground: () => isDark ? '#666' : '#999',
            mlrsBase: () => isDark ? '#888' : '#777',
            mlrsPod: () => isDark ? '#aaa' : '#555',
            mlrsWheel: () => isDark ? '#bbb' : '#333',
            enemy: () => isDark ? '#999' : '#666',
            enemyDetail: () => isDark ? '#ccc' : '#333',
            trail: () => isDark ? '#888' : '#777',
            laser: () => isDark ? '#0ff' : '#00bfff',
            mg: () => isDark ? '#fa0' : '#d80',
            healthFill: () => isDark ? '#f33' : '#d00',
            healthEmpty: () => isDark ? '#522' : '#eaa',
            overlay: () => isDark ? 'rgba(0, 0, 0, 0.75)' : 'rgba(255, 255, 255, 0.85)'
        };

        // Full Screen Setup
        let width, height;
        let groundY;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            groundY = height - 150; 
            if (player) {
                player.x = 120;
                player.y = groundY - 18;
            }
        }
        window.addEventListener('resize', resize);

        // Expanded Level Configuration
        const levelData = {
            1: { totalScore: 15,  rates: {inf: 160, tank: 0,   mech: 0,   drone: 0,   heli: 0,   bomber: 0},   speedMult: 1.0 },
            2: { totalScore: 80,  rates: {inf: 120, tank: 250, mech: 0,   drone: 0,   heli: 0,   bomber: 0},   speedMult: 1.2 },
            3: { totalScore: 120, rates: {inf: 140, tank: 300, mech: 0,   drone: 200, heli: 0,   bomber: 0},   speedMult: 1.3 },
            4: { totalScore: 180, rates: {inf: 90,  tank: 200, mech: 0,   drone: 180, heli: 250, bomber: 0},   speedMult: 1.4 },
            5: { totalScore: 200, rates: {inf: 80,  tank: 160, mech: 250, drone: 150, heli: 200, bomber: 400}, speedMult: 1.4 },
            6: { totalScore: 260, rates: {inf: 60,  tank: 130, mech: 220, drone: 120, heli: 170, bomber: 300}, speedMult: 1.5 },
            7: { totalScore: 320, rates: {inf: 50,  tank: 100, mech: 180, drone: 100, heli: 150, bomber: 250}, speedMult: 1.6 },
            8: { totalScore: 400, rates: {inf: 45,  tank: 90,  mech: 150, drone: 80,  heli: 120, bomber: 200}, speedMult: 1.7 },
            9: { totalScore: 500, rates: {inf: 40,  tank: 80,  mech: 120, drone: 70,  heli: 100, bomber: 150}, speedMult: 1.8 },
            10:{ totalScore: 600, rates: {inf: 30,  tank: 60,  mech: 100, drone: 50,  heli: 80,  bomber: 100}, speedMult: 2.0 }
        };

        // Game States
        let gameState = 'LOADING'; 
        let gameMode = 'MAIN'; 
        let menuSelectedMode = 'MAIN';
        let loadTimer = 0;
        const loadDuration = 150; 
        
        let lives = 10;
        const maxLives = 10; 
        let level = 1;
        let selectedStartLevel = 1; 
        
        // RVD Wave Input
        let rvdStartWaveStr = "1";
        let hasTypedRVD = false;
        
        let levelBudget = 0;
        let maxLevelBudget = 0;
        let isIntermission = false;
        let intermissionTimer = 0;

        let shotsFired = 0;
        let swarmMissilesReady = 0;
        let fleetReady = 0; 
        
        let frameCount = 0;
        let levelFrames = 0; 
        let barrierFlash = 0;
        let homingBeepTimer = 0;
        
        let fireCooldown = 0;

        // Weapon Modes
        let activeWeapon = 'MISSILE'; 
        let shootingMode = 'TARGET';  
        let isCharging = false;
        let chargeLevel = 0;
        const maxCharge = 26; 

        // Mouse Tracker
        const mouse = { x: 400, y: 300 };
        let isMouseDown = false;

        // Player
        let player = null;

        // Entities
        let missiles = [];
        let friendlyDrones = [];
        let lasers = [];
        let bullets = [];
        let explosions = [];
        let enemies = [];
        let particles = [];

        // Menu Layout Helper
        function getMenuLayout() {
            let bw = 70, bh = 45, gap = 15;
            let totalW = 5 * bw + 4 * gap;
            let startX = width / 2 - totalW / 2;
            let startY = height / 2 - 20;
            let rvdY = startY + 2 * (bh + gap);
            return { bw, bh, gap, totalW, startX, startY, rvdY };
        }

        function updateCursor() {
            if (gameState === 'PLAYING' || gameState === 'PAUSED') {
                canvas.style.cursor = 'none';
            } else if (gameState === 'START_MENU') {
                let layout = getMenuLayout();
                let isHovering = false;
                
                for (let i = 0; i < 10; i++) {
                    let row = Math.floor(i / 5);
                    let col = i % 5;
                    let bx = layout.startX + col * (layout.bw + layout.gap);
                    let by = layout.startY + row * (layout.bh + layout.gap);
                    if (mouse.x >= bx && mouse.x <= bx + layout.bw && mouse.y >= by && mouse.y <= by + layout.bh) {
                        isHovering = true;
                        break;
                    }
                }

                if (!isHovering && mouse.x >= layout.startX && mouse.x <= layout.startX + layout.totalW && mouse.y >= layout.rvdY && mouse.y <= layout.rvdY + layout.bh) {
                    isHovering = true;
                }
                
                canvas.style.cursor = isHovering ? 'pointer' : 'default';
            } else {
                canvas.style.cursor = 'default';
            }
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            sfx.init(); 
            
            if (e.code === 'KeyT') isDark = !isDark;
            
            if (gameState === 'START_MENU') {
                if (e.code === 'Backspace' && menuSelectedMode === 'RVD') {
                    rvdStartWaveStr = rvdStartWaveStr.slice(0, -1);
                    if (rvdStartWaveStr === "") {
                        rvdStartWaveStr = "1";
                        hasTypedRVD = false;
                    }
                }
                
                if (e.code.startsWith('Digit')) {
                    let num = e.key;
                    if (menuSelectedMode === 'MAIN') {
                        let n = parseInt(num);
                        if (n === 0) n = 10;
                        selectedStartLevel = n;
                    } else if (menuSelectedMode === 'RVD') {
                        if (!hasTypedRVD) {
                            rvdStartWaveStr = num;
                            hasTypedRVD = true;
                        } else if (rvdStartWaveStr.length < 3) {
                            rvdStartWaveStr += num;
                        }
                    }
                }

                if (e.code === 'Space' || e.code === 'Enter') {
                    gameMode = menuSelectedMode;
                    shootingMode = gameMode === 'MAIN' ? 'TARGET' : 'CHARGE'; 
                    resetGame();
                    let startLvl = 1;
                    if (gameMode === 'MAIN') {
                        startLvl = selectedStartLevel;
                    } else {
                        startLvl = parseInt(rvdStartWaveStr);
                        if (isNaN(startLvl) || startLvl < 1) startLvl = 1;
                    }
                    initLevel(startLvl);
                    gameState = 'PLAYING';
                    return;
                }
            }

            if (gameState === 'PLAYING' || gameState === 'PAUSED') {
                if (e.code === 'KeyM') {
                    if (gameMode === 'RVD') {
                        shootingMode = shootingMode === 'TARGET' ? 'CHARGE' : 'TARGET';
                    }
                }
                
                if (e.code === 'KeyE') {
                    if (gameMode === 'RVD' && fleetReady > 0) {
                        deployFleet();
                    }
                }
                
                if (e.code === 'KeyQ') {
                    if (gameMode === 'RVD') {
                        if (activeWeapon === 'MISSILE' && swarmMissilesReady > 0) activeWeapon = 'SWARM';
                        else if (activeWeapon === 'SWARM') activeWeapon = 'MISSILE';
                    } else {
                        if (activeWeapon === 'MISSILE') activeWeapon = 'LASER';
                        else if (activeWeapon === 'LASER') activeWeapon = 'MACHINE_GUN';
                        else activeWeapon = 'MISSILE';
                    }
                }

                if (gameMode === 'MAIN') {
                    if (e.code === 'Digit1') activeWeapon = 'MISSILE';
                    if (e.code === 'Digit2') activeWeapon = 'LASER';
                    if (e.code === 'Digit3') activeWeapon = 'MACHINE_GUN';
                }
            }
            
            if (e.code === 'KeyP') {
                if (gameState === 'PLAYING') gameState = 'PAUSED';
                else if (gameState === 'PAUSED') gameState = 'PLAYING';
            }
            
            if (e.code === 'Escape') {
                if (gameState === 'PLAYING' || gameState === 'PAUSED' || gameState === 'GAME_OVER' || gameState === 'GAME_CLEARED') {
                    resetGame();
                    hasTypedRVD = false;
                    gameState = 'START_MENU';
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            sfx.init();
            isMouseDown = true;
            
            if (gameState === 'START_MENU') {
                let layout = getMenuLayout();
                let clickedBox = false;

                // Check Level Boxes
                for (let i = 0; i < 10; i++) {
                    let row = Math.floor(i / 5);
                    let col = i % 5;
                    let bx = layout.startX + col * (layout.bw + layout.gap);
                    let by = layout.startY + row * (layout.bh + layout.gap);
                    
                    if (mouse.x >= bx && mouse.x <= bx + layout.bw && mouse.y >= by && mouse.y <= by + layout.bh) {
                        selectedStartLevel = i + 1;
                        menuSelectedMode = 'MAIN';
                        clickedBox = true;
                        break;
                    }
                }

                // Check RVD Box
                if (!clickedBox && mouse.x >= layout.startX && mouse.x <= layout.startX + layout.totalW && mouse.y >= layout.rvdY && mouse.y <= layout.rvdY + layout.bh) {
                    menuSelectedMode = 'RVD';
                    clickedBox = true;
                }
                
                return;
            }
            
            if (gameState === 'GAME_OVER') {
                resetGame();
                initLevel(level);
                gameState = 'PLAYING';
                return;
            }

            if (gameState === 'GAME_CLEARED') {
                gameState = 'START_MENU';
                return;
            }
            
            if (gameState !== 'PLAYING') return;
            if (mouse.x <= player.x + 20 || isIntermission || fireCooldown > 0) return;

            if (activeWeapon === 'FLEET') {
                deployFleet();
                fireCooldown = 60;
                return;
            }

            if (activeWeapon === 'LASER') {
                fireLaser();
                fireCooldown = 30;
            } else if (activeWeapon === 'MISSILE' || activeWeapon === 'SWARM') {
                if (missiles.length >= 80) return; 
                if (shootingMode === 'CHARGE') {
                    isCharging = true;
                    chargeLevel = 5; 
                } else if (shootingMode === 'TARGET') {
                    fireMissileTargetMode();
                    fireCooldown = 45;
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            isMouseDown = false;
            if (gameState === 'PLAYING' && (activeWeapon === 'MISSILE' || activeWeapon === 'SWARM') && shootingMode === 'CHARGE' && isCharging && !isIntermission) {
                fireMissileChargeMode();
                isCharging = false;
                chargeLevel = 0;
                fireCooldown = 45; 
            }
        });

        function deployFleet() {
            fleetReady--;
            activeWeapon = 'MISSILE';
            sfx.playTripleMissile();
            
            let topY = 110;
            let bottomY = groundY - 100;
            let stepY = (bottomY - topY) / 4;
            let offsetX = 80;
            
            friendlyDrones.push({ x: -50 - offsetX * 2, y: topY, vx: 5, fireTimer: 20 }); 
            friendlyDrones.push({ x: -50 - offsetX, y: topY + stepY, vx: 5, fireTimer: 30 }); 
            friendlyDrones.push({ x: -50, y: topY + stepY * 2, vx: 5, fireTimer: 40 }); // Middle (Front)
            friendlyDrones.push({ x: -50 - offsetX, y: topY + stepY * 3, vx: 5, fireTimer: 30 }); 
            friendlyDrones.push({ x: -50 - offsetX * 2, y: bottomY, vx: 5, fireTimer: 20 }); 
        }

        function getDistanceToLineSegment(px, py, x1, y1, x2, y2) {
            let A = px - x1;
            let B = py - y1;
            let C = x2 - x1;
            let D = y2 - y1;
            let dot = A * C + B * D;
            let len_sq = C * C + D * D;
            let param = -1;
            if (len_sq != 0) param = dot / len_sq;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; } 
            else if (param > 1) { xx = x2; yy = y2; } 
            else { xx = x1 + param * C; yy = y1 + param * D; }
            let dx = px - xx;
            let dy = py - yy;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function getTargetModeArcParams(targetX, targetY) {
            let startX = player.x + 10;
            let startY = player.y - 15;
            let dx = targetX - startX;
            let dy = targetY - startY;
            let dist = Math.hypot(dx, dy);
            
            let isAirShot = gameMode === 'MAIN' && targetY < groundY - 80;
            let arcHeight = isAirShot ? 0 : dist * 0.08; 
            
            let initialDy = dy - arcHeight * Math.PI; 
            let aimAngle = Math.atan2(initialDy, dx);
            
            return { aimAngle, arcHeight, dist, startX, startY };
        }

        function getPodAngle() {
            let startX = player.x + 10;
            let startY = player.y - 15;
            
            if (activeWeapon === 'MACHINE_GUN') {
                let aimAngle = Math.atan2(mouse.y - startY, mouse.x - startX);
                return aimAngle;
            }

            let targetX = mouse.x;
            let targetY = Math.min(mouse.y, groundY);

            if ((activeWeapon === 'MISSILE' || activeWeapon === 'SWARM') && shootingMode === 'TARGET' && targetX > startX) {
                let params = getTargetModeArcParams(targetX, targetY);
                return Math.max(-Math.PI / 1.1, Math.min(0, params.aimAngle));
            } else {
                let aimAngle = Math.atan2(targetY - startY, targetX - startX);
                return Math.max(-Math.PI / 1.1, Math.min(Math.PI / 4, aimAngle));
            }
        }

        function triggerShotLogic() {
            shotsFired++;
            if (gameMode === 'RVD' && shotsFired % 5 === 0) {
                if (swarmMissilesReady === 0) sfx.playAlert();
                swarmMissilesReady = 1; 
            }
            if (gameMode === 'RVD' && shotsFired > 0 && shotsFired % 10 === 0) {
                if (fleetReady === 0) sfx.playAlert();
                fleetReady = 1; 
            }
            return (shotsFired % 3 === 0);
        }

        function fireMachineGun() {
            sfx.playMG();
            let startX = player.x + 10;
            let startY = player.y - 15;
            let aimAngle = getPodAngle();
            let speed = 25; 
            let vx = Math.cos(aimAngle) * speed;
            let vy = Math.sin(aimAngle) * speed;
            
            bullets.push({ 
                x: startX, y: startY, 
                startX: startX, startY: startY,
                vx: vx, vy: vy 
            });
        }

        function fireLaser() {
            sfx.playLaser();
            let isTriBeam = triggerShotLogic();
            let startX = player.x + 10;
            let startY = player.y - 15;
            let baseAimAngle = getPodAngle();
            
            let angles = isTriBeam ? [baseAimAngle - 0.08, baseAimAngle, baseAimAngle + 0.08] : [baseAimAngle];
            
            for (let aimAngle of angles) {
                let endX = startX + Math.cos(aimAngle) * 3000;
                let endY = startY + Math.sin(aimAngle) * 3000;
                
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let en = enemies[i];
                    if (['drone', 'heli', 'bomber'].includes(en.type)) {
                        let dist = getDistanceToLineSegment(en.x, en.y, startX, startY, endX, endY);
                        if (dist < Math.max(en.width, en.height) / 2 + 15) { 
                            let expSize = en.type === 'bomber' ? 45 : (en.type === 'heli' ? 30 : 20);
                            createExplosion(en.x, en.y, expSize);
                            enemies.splice(i, 1);
                        }
                    }
                }
                lasers.push({ startX, startY, endX, endY, timer: 15, maxTimer: 15 });
            }
        }

        function fireMissileTargetMode() {
            let isSwarm = (activeWeapon === 'SWARM');
            let isCluster = false;

            if (isSwarm) {
                swarmMissilesReady--;
                if (swarmMissilesReady <= 0) activeWeapon = 'MISSILE';
            } else {
                isCluster = triggerShotLogic();
            }

            if (isSwarm) sfx.playSwarmLaunch();
            else if (isCluster) sfx.playTripleMissile();
            else sfx.playMissile();

            let targetX = mouse.x;
            let targetY = Math.min(mouse.y, groundY); 
            
            let params = getTargetModeArcParams(targetX, targetY);
            let framesToTarget = Math.max(5, params.dist / 25); 

            missiles.push({
                mode: 'TARGET',
                startX: params.startX, startY: params.startY,
                x: params.startX, y: params.startY,
                targetX: targetX, targetY: targetY,
                arcHeight: params.arcHeight,
                timer: framesToTarget, initialTimer: framesToTarget,
                path: [],
                isCluster: isCluster,
                isSwarmParent: isSwarm,
                age: 0,
                splitTime: -1,
                isRed: isCluster || isSwarm
            });
        }

        function fireMissileChargeMode() {
            let isSwarm = (activeWeapon === 'SWARM');
            let isCluster = false;

            if (isSwarm) {
                swarmMissilesReady--;
                if (swarmMissilesReady <= 0) activeWeapon = 'MISSILE';
            } else {
                isCluster = triggerShotLogic();
            }

            if (isSwarm) sfx.playSwarmLaunch();
            else if (isCluster) sfx.playTripleMissile();
            else sfx.playMissile();

            let startX = player.x + 10;
            let startY = player.y - 15; 
            let aimAngle = getPodAngle();
            
            let velocity = chargeLevel;
            let vx = Math.cos(aimAngle) * velocity;
            let vy = Math.sin(aimAngle) * velocity;
            
            let targetY = Math.min(mouse.y, groundY);
            let gravity = (gameMode === 'RVD' || targetY >= groundY - 80) ? 0.25 : 0;

            let splitTime = -1;
            if (isSwarm || isCluster) {
                if (gravity > 0) {
                    let a = 0.5 * gravity; 
                    let b = vy;
                    let c = startY - groundY;
                    let disc = b*b - 4*a*c;
                    if (disc > 0) {
                        let t = (-b + Math.sqrt(disc)) / (2*a);
                        splitTime = isSwarm ? Math.floor(t / 4) : Math.floor(t / 3);
                    } else {
                        splitTime = 15; 
                    }
                } else {
                    let distanceX = width - startX;
                    let t = distanceX / Math.abs(vx || 1);
                    splitTime = isSwarm ? Math.floor(t / 4) : Math.floor(t / 3);
                }
                splitTime = Math.max(5, splitTime);
            }

            missiles.push({
                mode: 'CHARGE',
                x: startX, y: startY,
                vx: vx, vy: vy, g: gravity, 
                path: [],
                isCluster: isCluster,
                isSwarmParent: isSwarm,
                hasSplit: false,
                age: 0,
                splitTime: splitTime,
                isRed: isCluster || isSwarm 
            });
        }

        function initLevel(lvl) {
            level = lvl;
            lives = maxLives;
            
            if (gameMode === 'MAIN') {
                maxLevelBudget = levelData[level].totalScore;
                activeWeapon = 'MISSILE';
            } else if (gameMode === 'RVD') {
                maxLevelBudget = 30 + level * 20; 
                activeWeapon = 'MISSILE';
            }

            levelBudget = maxLevelBudget;
            isIntermission = false;
            intermissionTimer = 0;
            levelFrames = 0;
            enemies = [];
            missiles = [];
            lasers = [];
            bullets = [];
            friendlyDrones = [];
        }

        function resetGame() {
            shotsFired = 0;
            swarmMissilesReady = 0;
            fleetReady = 0;
            fireCooldown = 0;
            barrierFlash = 0;
            missiles = [];
            friendlyDrones = [];
            lasers = [];
            bullets = [];
            explosions = [];
            particles = [];
            isCharging = false;
            chargeLevel = 0;
            frameCount = 0;
            levelFrames = 0;
        }

        function spawnEnemyType(type, customSpeedMod = null) {
            let cost = 1;
            if (type === 'drone') cost = 10;
            if (type === 'tank') cost = 5;
            if (type === 'mech') cost = 20;
            if (type === 'heli') cost = 15;
            if (type === 'bomber') cost = 25;

            if (levelBudget >= cost) {
                levelBudget -= cost;
                
                let speedMod = customSpeedMod ? customSpeedMod : levelData[level].speedMult;
                let skyCeiling = 110; 
                let flightZone = groundY - skyCeiling;

                if (type === 'drone') {
                    enemies.push({
                        type: 'drone',
                        x: width + 50,
                        y: skyCeiling + Math.random() * (flightZone * 0.6),
                        width: 36, height: 18, 
                        speed: (2 + Math.random() * 1.5) * speedMod
                    });
                } else if (type === 'infantry') {
                    enemies.push({
                        type: 'infantry',
                        x: width + 50,
                        y: groundY - 9, 
                        width: 15, height: 36, 
                        speed: (0.6 + Math.random() * 0.4) * speedMod
                    });
                } else if (type === 'tank') {
                    enemies.push({
                        type: 'tank',
                        x: width + 50,
                        y: groundY - 18,
                        width: 54, height: 36, 
                        speed: (1.2 + Math.random() * 0.6) * speedMod
                    });
                } else if (type === 'mech') {
                    enemies.push({
                        type: 'mech',
                        x: width + 50,
                        y: groundY - 30, 
                        width: 42, height: 60, 
                        speed: (0.7 + Math.random() * 0.3) * speedMod 
                    });
                } else if (type === 'heli') {
                    enemies.push({
                        type: 'heli',
                        x: width + 50,
                        y: skyCeiling + (flightZone * 0.2) + Math.random() * (flightZone * 0.6),
                        width: 51, height: 24, 
                        speed: (1.0 + Math.random() * 0.8) * speedMod 
                    });
                } else if (type === 'bomber') {
                    enemies.push({
                        type: 'bomber',
                        x: width + 50,
                        y: skyCeiling + Math.random() * (flightZone - 60), 
                        width: 75, height: 26, 
                        speed: (4.0 + Math.random() * 1.5) * speedMod 
                    });
                }
            }
        }

        function createExplosion(x, y, radius = 45, color = null) {
            sfx.playExplosion(radius);
            explosions.push({
                x: x, y: y,
                radius: 0,
                maxRadius: radius + Math.random() * 15,
                duration: 50, 
                timer: 0,
                color: color
            });

            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 20 + Math.random() * 20,
                    color: color ? color : (i % 2 === 0 ? theme.fg() : theme.trail()) 
                });
            }
        }

        resize();
        player = { x: 120, y: groundY - 18 };
        resetGame();

        function drawUIMissile(x, y, w, h) {
            let tipH = h * 0.35;
            let bodyH = h - tipH;
            ctx.fillRect(x - w/2, y + tipH, w, bodyH);
            ctx.beginPath();
            ctx.moveTo(x - w/2, y + tipH);
            ctx.lineTo(x, y);
            ctx.lineTo(x + w/2, y + tipH);
            ctx.fill();
            let oldFill = ctx.fillStyle;
            ctx.fillStyle = theme.enemyDetail();
            ctx.fillRect(x - w/2, y + h - bodyH * 0.3, w, bodyH * 0.3);
            ctx.fillStyle = oldFill;
        }

        function update() {
            if (gameState === 'LOADING') {
                loadTimer++;
                if (loadTimer >= loadDuration) gameState = 'START_MENU';
                return;
            }

            if (gameState !== 'PLAYING') return;
            
            frameCount++;
            if (barrierFlash > 0) barrierFlash--;
            
            if (fireCooldown > 0) fireCooldown--;

            if (isMouseDown && activeWeapon === 'MACHINE_GUN' && fireCooldown <= 0 && !isIntermission) {
                if (mouse.x > player.x + 20) {
                    fireMachineGun();
                    fireCooldown = 6; 
                }
            }

            if (isIntermission) {
                intermissionTimer--;
                if (intermissionTimer <= 0) {
                    if (gameMode === 'MAIN' && level >= 10) {
                        gameState = 'GAME_CLEARED';
                    } else {
                        initLevel(level + 1);
                    }
                }
            } else {
                levelFrames++;
                if (levelBudget <= 0 && enemies.length === 0) {
                    sfx.playLevelUp();
                    isIntermission = true;
                    intermissionTimer = 180; 
                }
            }

            if ((activeWeapon === 'MISSILE' || activeWeapon === 'SWARM') && isCharging && chargeLevel < maxCharge) {
                chargeLevel += 0.4;
            }

            if (!isIntermission && levelBudget > 0) {
                if (gameMode === 'MAIN') {
                    let conf = levelData[level];
                    if (conf.rates.drone > 0 && frameCount % conf.rates.drone === 0) spawnEnemyType('drone');
                    if (conf.rates.inf > 0 && frameCount % conf.rates.inf === 0) spawnEnemyType('infantry');
                    if (conf.rates.tank > 0 && frameCount % conf.rates.tank === 0) spawnEnemyType('tank');
                    if (conf.rates.mech > 0 && frameCount % conf.rates.mech === 0) spawnEnemyType('mech');
                    if (conf.rates.heli > 0 && frameCount % conf.rates.heli === 0) spawnEnemyType('heli');
                    if (conf.rates.bomber > 0 && frameCount % conf.rates.bomber === 0) spawnEnemyType('bomber');
                } else if (gameMode === 'RVD') {
                    let droneRate = Math.max(30, 160 - level * 10);
                    let infRate = Math.max(40, 140 - level * 8);
                    let dynSpeed = 1.0 + level * 0.1;
                    
                    if (frameCount % droneRate === 0) spawnEnemyType('drone', dynSpeed);
                    if (frameCount % infRate === 0) spawnEnemyType('infantry', dynSpeed);
                }
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].timer--;
                if (lasers[i].timer <= 0) lasers.splice(i, 1);
            }
            
            let maxRangeX = width / 3;
            let maxRangeY = player.y - 15; 

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.lastX = b.x;
                b.lastY = b.y;
                b.x += b.vx;
                b.y += b.vy;
                
                let dx = b.x - b.startX;
                let dy = b.y - b.startY;
                let isOutsideEllipse = ((dx * dx) / (maxRangeX * maxRangeX)) + ((dy * dy) / (maxRangeY * maxRangeY)) > 1;
                let detonated = false;
                
                if (isOutsideEllipse || b.y >= groundY || b.y < 0) {
                    detonated = true;
                } else {
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        let en = enemies[j];
                        
                        let hitY = en.y;
                        if (['infantry', 'tank', 'mech'].includes(en.type)) {
                            hitY -= en.height/2;
                        }
                        
                        let dist = getDistanceToLineSegment(en.x, hitY, b.lastX, b.lastY, b.x, b.y);
                        
                        if (dist < Math.max(en.width, en.height) / 2 + 5) {
                            let expSize = 30;
                            if (en.type === 'tank') expSize = 50;
                            else if (en.type === 'bomber' || en.type === 'mech') expSize = 65;
                            
                            createExplosion(en.x, hitY, expSize);
                            enemies.splice(j, 1);
                            detonated = true;
                            break;
                        }
                    }
                }
                if (detonated) bullets.splice(i, 1);
            }

            for (let en of enemies) en.isTargeted = false;

            for(let i = friendlyDrones.length - 1; i >= 0; i--) {
                let fd = friendlyDrones[i];
                fd.x += fd.vx;
                fd.fireTimer--;
                if (fd.fireTimer <= 0) {
                    if (enemies.length > 0) {
                        fd.fireTimer = 40 + Math.random() * 40;
                        let target = enemies[Math.floor(Math.random() * enemies.length)];
                        missiles.push({
                            mode: 'FRIENDLY_MISSILE',
                            x: fd.x, y: fd.y + 10,
                            vx: 0, vy: 5, g: 0, 
                            path: [], 
                            targetObj: target,
                            speed: 8, 
                            age: 0,
                            isBlue: true 
                        });
                    } else {
                        fd.fireTimer = 10; 
                    }
                }
                if (fd.x > width + 100) friendlyDrones.splice(i, 1);
            }

            let hasHoming = missiles.some(m => m.mode === 'SWARM_CHILD' || m.mode === 'FRIENDLY_MISSILE');
            if (hasHoming) {
                homingBeepTimer--;
                if (homingBeepTimer <= 0) {
                    sfx.playHoming();
                    homingBeepTimer = 10;
                }
            } else {
                homingBeepTimer = 0;
            }

            for (let i = missiles.length - 1; i >= 0; i--) {
                let m = missiles[i];
                m.age++;
                
                m.path.push({x: m.x, y: m.y});
                if (m.path.length > 20) m.path.shift();

                if (m.mode === 'TARGET') {
                    m.timer--;
                    let t = 1 - (m.timer / m.initialTimer);
                    m.x = m.startX + (m.targetX - m.startX) * t;
                    m.y = m.startY + (m.targetY - m.startY) * t - m.arcHeight * Math.sin(t * Math.PI);
                } else if (m.mode === 'SWARM_CHILD' || m.mode === 'FRIENDLY_MISSILE') {
                    if (m.targetObj && enemies.includes(m.targetObj)) {
                        m.targetObj.isTargeted = true; 
                        let hitY = (['tank', 'infantry', 'mech'].includes(m.targetObj.type)) ? m.targetObj.y - m.targetObj.height/2 : m.targetObj.y;
                        let targetAngle = Math.atan2(hitY - m.y, m.targetObj.x - m.x);
                        let currentAngle = Math.atan2(m.vy, m.vx);
                        
                        let angleDiff = targetAngle - currentAngle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                        
                        let turnSpeed = 0.15; 
                        if (angleDiff > turnSpeed) currentAngle += turnSpeed;
                        else if (angleDiff < -turnSpeed) currentAngle -= turnSpeed;
                        else currentAngle = targetAngle;
                        
                        m.vx = Math.cos(currentAngle) * m.speed;
                        m.vy = Math.sin(currentAngle) * m.speed;
                    } else {
                        if (enemies.length > 0) {
                            m.targetObj = enemies[Math.floor(Math.random() * enemies.length)];
                        }
                    }
                    m.x += m.vx;
                    m.y += m.vy;
                } else {
                    m.x += m.vx;
                    m.y += m.vy;
                    m.vy += m.g; 
                    if (m.mode === 'CLUSTER_CHILD') m.timer--;
                }

                if (m.isSwarmParent) {
                    let shouldSplit = false;
                    if (m.mode === 'TARGET') {
                        shouldSplit = (m.timer <= m.initialTimer * 0.75); 
                    } else {
                        shouldSplit = (m.age >= m.splitTime);
                    }

                    if (shouldSplit) {
                        let curVx = 0, curVy = 0;
                        if (m.mode === 'TARGET') {
                            let t1 = 1 - ((m.timer+1) / m.initialTimer);
                            let t2 = 1 - (m.timer / m.initialTimer);
                            let x1 = m.startX + (m.targetX - m.startX) * t1;
                            let x2 = m.startX + (m.targetX - m.startX) * t2;
                            let y1 = m.startY + (m.targetY - m.startY) * t1 - m.arcHeight * Math.sin(t1 * Math.PI);
                            let y2 = m.startY + (m.targetY - m.startY) * t2 - m.arcHeight * Math.sin(t2 * Math.PI);
                            curVx = x2 - x1;
                            curVy = y2 - y1;
                        } else {
                            curVx = m.vx;
                            curVy = m.vy;
                        }

                        let availableTargets = [...enemies].sort(() => Math.random() - 0.5);

                        for(let k=0; k<10; k++) {
                            let target = availableTargets.length > 0 ? availableTargets[k % availableTargets.length] : null;
                            let angleOffset = (Math.random() - 0.5) * Math.PI * 0.8; 
                            let speed = 7 + Math.random() * 2; 
                            let baseAngle = Math.atan2(curVy, curVx);
                            let newAngle = baseAngle + angleOffset;
                            missiles.push({
                                mode: 'SWARM_CHILD',
                                x: m.x, y: m.y,
                                vx: Math.cos(newAngle) * speed,
                                vy: Math.sin(newAngle) * speed,
                                g: 0, 
                                path: [...m.path], 
                                targetObj: target,
                                speed: speed,
                                age: 0,
                                isRed: true 
                            });
                        }
                        missiles.splice(i, 1);
                        continue;
                    }
                }

                if (m.isCluster) {
                    let shouldSplit = false;
                    if (m.mode === 'TARGET') {
                        shouldSplit = (m.timer <= m.initialTimer * 0.666); 
                    } else {
                        shouldSplit = (m.age >= m.splitTime && !m.hasSplit && m.splitTime > 0);
                    }

                    if (shouldSplit) {
                        m.isCluster = false; 
                        m.isRed = true; 
                        if (m.mode === 'CHARGE') m.hasSplit = true;
                        
                        const spawnChild = (angleOffset, targetOffsetX) => {
                            if (m.mode === 'TARGET') {
                                let childTargetX = m.targetX + targetOffsetX;
                                let childTargetY = m.targetY;
                                let childTimer = Math.max(5, m.timer); 
                                
                                let cDx = childTargetX - m.x;
                                let cDy = childTargetY - m.y;
                                let childVx = cDx / childTimer;
                                
                                let isAirShot = gameMode === 'MAIN' && childTargetY < groundY - 80;
                                let childArcHeight = isAirShot ? 0 : Math.hypot(cDx, cDy) * 0.08;
                                
                                let g = isAirShot ? 0 : 0.25;
                                let childVy = (cDy - 0.5 * g * Math.pow(childTimer, 2)) / childTimer;

                                missiles.push({
                                    mode: 'CLUSTER_CHILD',
                                    x: m.x, y: m.y,
                                    vx: childVx, vy: childVy, g: g,
                                    targetX: childTargetX, targetY: childTargetY,
                                    timer: childTimer,
                                    path: [...m.path], 
                                    isCluster: false,
                                    hasSplit: true,
                                    isRed: true 
                                });
                            } else {
                                let speed = Math.hypot(m.vx, m.vy);
                                let baseAngle = Math.atan2(m.vy, m.vx);
                                let newAngle = baseAngle + angleOffset;
                                let childVx = Math.cos(newAngle) * speed;
                                let childVy = Math.sin(newAngle) * speed;

                                missiles.push({
                                    mode: 'CHARGE',
                                    x: m.x, y: m.y,
                                    vx: childVx, vy: childVy,
                                    g: m.g,
                                    path: [...m.path], 
                                    isCluster: false,
                                    hasSplit: true,
                                    isRed: true 
                                });
                            }
                        };
                        
                        if (m.mode === 'TARGET') {
                            spawnChild(0, -60);
                            spawnChild(0, 60);
                        } else {
                            spawnChild(-0.15, 0);
                            spawnChild(0.15, 0);
                        }
                    }
                }

                let detonated = false;
                
                if ((m.mode === 'TARGET' || m.mode === 'CLUSTER_CHILD') && (m.timer <= 0 || m.y >= groundY)) {
                    detonated = true;
                }
                
                if (m.mode === 'CHARGE' || m.mode === 'SWARM_CHILD' || m.mode === 'FRIENDLY_MISSILE') {
                    if (m.y >= groundY || m.x > width + 100 || m.y < -100 || m.x < -100) detonated = true;
                    if (!detonated) {
                        for (let en of enemies) {
                            let hitY = (['tank', 'infantry', 'mech'].includes(en.type)) ? en.y - en.height/2 : en.y;
                            let dist = Math.hypot(m.x - en.x, m.y - hitY);
                            if (dist < 45) { 
                                detonated = true;
                                break; 
                            }
                        }
                    }
                }

                if (detonated) {
                    if (m.x < width && m.x > -50 && m.y > -50 && m.y <= groundY + 10) {
                        let expColor = null;
                        if (m.isBlue) {
                            expColor = '#0af';
                        } else if (m.isRed || m.mode === 'CLUSTER_CHILD' || m.isSwarmParent || m.mode === 'SWARM_CHILD') {
                            expColor = '#f00';
                        }
                        createExplosion(m.x, Math.min(m.y, groundY), 45, expColor);
                    }
                    missiles.splice(i, 1);
                }
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                let e = explosions[i];
                e.timer++;
                
                if (e.timer < e.duration / 2) {
                    e.radius = (e.timer / (e.duration / 2)) * e.maxRadius;
                } else {
                    e.radius = e.maxRadius - ((e.timer - e.duration / 2) / (e.duration / 2)) * e.maxRadius;
                }

                if (e.timer >= e.duration) {
                    explosions.splice(i, 1);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let en = enemies[i];
                en.x -= en.speed; 
                
                if (en.type === 'heli') en.y += Math.sin(frameCount * 0.05) * 0.5;

                if (en.x < player.x - 60) {
                    lives--;
                    barrierFlash = 30;
                    createExplosion(player.x, player.y, 40); 
                    enemies.splice(i, 1);
                    if (lives <= 0) {
                        sfx.playGameOver();
                        gameState = 'GAME_OVER';
                    }
                    continue;
                }

                let destroyed = false;
                for (let e of explosions) {
                    let hitY = (['tank', 'infantry', 'mech'].includes(en.type)) ? en.y - en.height/2 : en.y; 
                    let dist = Math.hypot(en.x - e.x, hitY - e.y);
                    
                    if (dist < e.radius + Math.max(en.width, en.height) / 2) {
                        destroyed = true;
                        let expSize = 30;
                        if (en.type === 'tank') expSize = 50;
                        if (en.type === 'mech') expSize = 65;
                        if (en.type === 'heli') expSize = 45;
                        if (en.type === 'bomber') expSize = 65;
                        
                        createExplosion(en.x, hitY, expSize); 
                        break;
                    }
                }

                if (destroyed) enemies.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; 
                p.life--;
                
                if (p.y > groundY) {
                    p.y = groundY;
                    p.vy *= -0.5;
                }
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            if (gameState === 'LOADING') {
                ctx.fillStyle = theme.bg();
                ctx.fillRect(0, 0, width, height);
                let cx = width / 2;
                let cy = height / 2 - 40;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.strokeStyle = theme.fg();
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 80, 0, Math.PI * 2);
                ctx.stroke();
                
                let r1 = (loadTimer * 1.5) % 80;
                let r2 = ((loadTimer + 40) * 1.5) % 80;
                ctx.strokeStyle = theme.trail();
                ctx.beginPath(); ctx.arc(0, 0, r1, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, r2, 0, Math.PI * 2); ctx.stroke();
                
                ctx.rotate(loadTimer * 0.1);
                ctx.strokeStyle = theme.fg();
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(80, 0);
                ctx.stroke();
                ctx.restore();

                ctx.fillStyle = theme.fg();
                ctx.textAlign = 'center';
                ctx.font = '24px "Courier New"';
                ctx.fillText('INITIALIZING', cx, cy + 120);
                return; 
            }

            ctx.fillStyle = (gameState === 'PAUSED') ? theme.bg() : theme.bgTrail();
            ctx.fillRect(0, 0, width, height);
            
            if (barrierFlash > 0 && gameState === 'PLAYING') {
                ctx.save();
                ctx.globalAlpha = barrierFlash / 40;
                ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }

            if (gameState === 'PLAYING') {
                ctx.save();
                ctx.strokeStyle = barrierFlash > 0 ? '#f00' : 'rgba(255, 0, 0, 0.1)';
                ctx.lineWidth = barrierFlash > 0 ? 4 : 2;
                if (barrierFlash > 0) ctx.shadowBlur = 15;
                ctx.shadowColor = '#f00';
                ctx.beginPath();
                ctx.moveTo(player.x - 60, groundY);
                ctx.lineTo(player.x - 60, 0);
                ctx.stroke();
                ctx.restore();
            }

            ctx.strokeStyle = theme.ground();
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(width, groundY);
            ctx.stroke();
            
            if (activeWeapon === 'MACHINE_GUN' && (gameState === 'PLAYING' || gameState === 'PAUSED')) {
                ctx.save();
                ctx.strokeStyle = theme.trail();
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                let podX = player.x + 10;
                let podY = player.y - 15;
                let rx = width / 3;
                let ry = podY; 
                ctx.ellipse(podX, podY, rx, ry, 0, Math.PI, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }

            let progress = Math.max(0, Math.min(1, (maxLevelBudget - levelBudget) / maxLevelBudget));
            ctx.fillStyle = theme.ground();
            ctx.fillRect(0, 0, width, 10);
            ctx.fillStyle = theme.fg();
            ctx.fillRect(0, 0, width * progress, 10);

            if (gameState === 'PLAYING' || gameState === 'PAUSED') {
                ctx.save();
                ctx.translate(20, 25);
                let hpBarWidth = 250;
                let hpBarHeight = 18;
                let segmentWidth = (hpBarWidth - (maxLives - 1) * 3) / maxLives;
                ctx.fillStyle = theme.healthEmpty();
                for (let i = 0; i < maxLives; i++) {
                    ctx.fillRect(i * (segmentWidth + 3), 0, segmentWidth, hpBarHeight);
                }

                ctx.fillStyle = theme.healthFill();
                for (let i = 0; i < lives; i++) {
                    ctx.fillRect(i * (segmentWidth + 3), 0, segmentWidth, hpBarHeight);
                }
                ctx.restore();
            }

            if (gameState === 'PLAYING' || gameState === 'PAUSED') {
                let chSize = 15;
                ctx.strokeStyle = activeWeapon === 'LASER' ? theme.laser() : (activeWeapon === 'MACHINE_GUN' ? theme.mg() : (activeWeapon === 'SWARM' || activeWeapon === 'FLEET' ? '#f00' : theme.fg()));
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(mouse.x - chSize, mouse.y);
                ctx.lineTo(mouse.x + chSize, mouse.y);
                ctx.moveTo(mouse.x, mouse.y - chSize);
                ctx.lineTo(mouse.x, mouse.y + chSize);
                ctx.stroke();
            }

            for (let l of lasers) {
                ctx.strokeStyle = theme.laser();
                ctx.lineWidth = 15 * (l.timer / l.maxTimer); 
                ctx.beginPath();
                ctx.moveTo(l.startX, l.startY);
                ctx.lineTo(l.endX, l.endY);
                ctx.stroke();
                
                ctx.strokeStyle = '#fff'; 
                ctx.lineWidth = 6 * (l.timer / l.maxTimer); 
                ctx.beginPath();
                ctx.moveTo(l.startX, l.startY);
                ctx.lineTo(l.endX, l.endY);
                ctx.stroke();
            }
            
            for (let b of bullets) {
                ctx.strokeStyle = theme.mg();
                ctx.lineWidth = 2;
                ctx.beginPath();
                let len = 10;
                let speed = Math.hypot(b.vx, b.vy);
                let nx = b.vx / speed;
                let ny = b.vy / speed;
                ctx.moveTo(b.x - nx * len, b.y - ny * len);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
            }

            ctx.save();
            ctx.translate(player.x, player.y);

            ctx.fillStyle = theme.mlrsBase();
            ctx.fillRect(-50, -15, 100, 20); 
            ctx.fillRect(-50, -28, 25, 13); 
            ctx.fillStyle = theme.mlrsWheel();
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.arc(-40 + i*20, 10, 8, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.save();
            ctx.translate(10, -15); 
            let aimAngle = getPodAngle();
            ctx.rotate(aimAngle);
            ctx.fillStyle = theme.mlrsPod();
            ctx.fillRect(-15, -15, 60, 30); 
            
            if (activeWeapon === 'LASER') {
                ctx.fillStyle = theme.laser();
                ctx.fillRect(-10, -10, 55, 20); 
            } else if (activeWeapon === 'MACHINE_GUN') {
                ctx.fillStyle = theme.mg();
                ctx.fillRect(-10, -12, 55, 4);
                ctx.fillRect(-10, 8, 55, 4);
            } else {
                ctx.fillStyle = isDark ? '#000' : '#ddd'; 
                ctx.fillRect(-10, -12, 55, 4);
                ctx.fillRect(-10, -2, 55, 4);
                ctx.fillRect(-10, 8, 55, 4);
            }
            ctx.restore(); 

            ctx.save();
            ctx.translate(0, 50); 
            
            let nextIsCluster = (shotsFired + 1) % 3 === 0;
            if (activeWeapon === 'MISSILE') {
                if (nextIsCluster) {
                    ctx.fillStyle = '#f00'; 
                    drawUIMissile(-14, 0, 8, 20);
                    drawUIMissile(0, 0, 8, 20);
                    drawUIMissile(14, 0, 8, 20);
                } else {
                    ctx.fillStyle = theme.trail();
                    drawUIMissile(0, 0, 10, 24);
                }
            } else if (activeWeapon === 'SWARM') {
                ctx.fillStyle = '#f00';
                drawUIMissile(-12, 0, 4, 15);
                drawUIMissile(-4, -5, 4, 15);
                drawUIMissile(4, -5, 4, 15);
                drawUIMissile(12, 0, 4, 15);
            } else if (activeWeapon === 'FLEET') {
                ctx.fillStyle = '#0af';
                ctx.fillRect(-15, -4, 30, 8);
                ctx.fillRect(-10, -8, 20, 16);
            } else if (activeWeapon === 'LASER') {
                if (nextIsCluster) {
                    ctx.fillStyle = theme.laser();
                    ctx.fillRect(-20, -4, 40, 6);
                    ctx.fillRect(-20, 6, 40, 6);
                    ctx.fillRect(-20, 16, 40, 6);
                } else {
                    ctx.fillStyle = theme.laser();
                    ctx.fillRect(-20, 2, 40, 12);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-8, 5, 16, 6);
                }
            } else if (activeWeapon === 'MACHINE_GUN') {
                ctx.fillStyle = theme.mg();
                ctx.fillRect(-16, -4, 6, 16);
                ctx.fillRect(-3, -4, 6, 16);
                ctx.fillRect(10, -4, 6, 16);
                ctx.beginPath(); ctx.moveTo(-16, -4); ctx.lineTo(-13, -10); ctx.lineTo(-10, -4); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-3, -4); ctx.lineTo(0, -10); ctx.lineTo(3, -4); ctx.fill();
                ctx.beginPath(); ctx.moveTo(10, -4); ctx.lineTo(13, -10); ctx.lineTo(16, -4); ctx.fill();
            }

            ctx.translate(0, 35); 
            ctx.fillStyle = theme.trail();
            ctx.fillRect(-35, 0, 70, 6); 
            
            if (fireCooldown > 0) {
                ctx.fillStyle = activeWeapon === 'LASER' ? theme.laser() : (activeWeapon === 'MACHINE_GUN' ? theme.mg() : theme.fg());
                let cooldownMax = activeWeapon === 'MACHINE_GUN' ? 6 : (activeWeapon === 'LASER' ? 30 : 45);
                if (activeWeapon === 'FLEET') cooldownMax = 60;
                let pct = 1 - (fireCooldown / cooldownMax);
                ctx.fillRect(-35, 0, 70 * pct, 6);
            } else {
                ctx.fillStyle = activeWeapon === 'LASER' ? theme.laser() : (activeWeapon === 'MACHINE_GUN' ? theme.mg() : theme.fg());
                ctx.fillRect(-35, 0, 70, 6);
            }

            if (gameMode === 'RVD') {
                ctx.translate(0, 25);
                if (swarmMissilesReady > 0 && activeWeapon !== 'SWARM') {
                    ctx.fillStyle = '#f00';
                    drawUIMissile(-9, 0, 3, 11);
                    drawUIMissile(-3, -4, 3, 11);
                    drawUIMissile(3, -4, 3, 11);
                    drawUIMissile(9, 0, 3, 11);
                }
                if (fleetReady > 0 && activeWeapon !== 'FLEET') {
                    ctx.fillStyle = '#0af';
                    let fleetOffsetX = (swarmMissilesReady > 0 && activeWeapon !== 'SWARM') ? 20 : 0;
                    ctx.fillRect(fleetOffsetX - 8, -2, 16, 4);
                    ctx.fillRect(fleetOffsetX - 4, -5, 8, 10);
                }
            }

            ctx.restore();

            if ((activeWeapon === 'MISSILE' || activeWeapon === 'SWARM') && shootingMode === 'CHARGE' && isCharging) {
                ctx.strokeStyle = theme.fg();
                ctx.strokeRect(-50, -60, 100, 8);
                ctx.fillStyle = theme.fg();
                let chargePct = Math.max(0, Math.min(1, chargeLevel / maxCharge));
                ctx.fillRect(-50, -60, 100 * chargePct, 8);
            }

            ctx.restore(); 

            for (let fd of friendlyDrones) {
                ctx.save();
                ctx.translate(fd.x, fd.y);
                ctx.fillStyle = theme.enemy();
                ctx.fillRect(-18, -9, 36, 18);
                ctx.fillStyle = theme.enemyDetail();
                ctx.fillRect(-21, -15, 9, 6);
                ctx.fillRect(12, -15, 9, 6);
                ctx.fillStyle = '#0af'; 
                ctx.fillRect(6, -3, 8, 6);
                ctx.restore();
            }

            for (let m of missiles) {
                let isClust = m.isCluster || m.mode === 'CLUSTER_CHILD';
                let isSwarm = m.isSwarmParent || m.mode === 'SWARM_CHILD';

                if (m.path.length > 1) {
                    ctx.strokeStyle = isClust ? '#f00' : (isSwarm ? '#fff' : (m.isBlue ? '#0af' : theme.trail())); 
                    ctx.lineWidth = m.isCluster ? 4 : 2; 
                    ctx.beginPath();
                    ctx.moveTo(m.path[0].x, m.path[0].y);
                    for (let i = 1; i < m.path.length; i++) {
                        ctx.lineTo(m.path[i].x, m.path[i].y);
                    }
                    ctx.stroke();
                }
                
                ctx.save();
                ctx.translate(m.x, m.y);
                
                let mAngle = 0;
                if (m.mode === 'TARGET') {
                    if (m.arcHeight > 0) {
                        let t = 1 - (m.timer / m.initialTimer);
                        let dx = m.targetX - m.startX;
                        let dy = m.targetY - m.startY;
                        let vx = dx;
                        let vy = dy - m.arcHeight * Math.PI * Math.cos(t * Math.PI);
                        mAngle = Math.atan2(vy, vx);
                    } else {
                        mAngle = Math.atan2(m.targetY - m.startY, m.targetX - m.startX);
                    }
                } else {
                    mAngle = Math.atan2(m.vy, m.vx);
                }
                
                ctx.rotate(mAngle);
                
                let size = (m.isCluster || m.isSwarmParent) ? 1.5 : ((m.mode === 'SWARM_CHILD' || m.mode === 'FRIENDLY_MISSILE') ? 0.7 : 1);
                
                ctx.fillStyle = m.isBlue ? '#0af' : ((isClust || isSwarm) ? '#f00' : theme.fg());
                ctx.fillRect(-6 * size, -2 * size, 10 * size, 4 * size);
                ctx.beginPath();
                ctx.moveTo(4 * size, -2 * size);
                ctx.lineTo(10 * size, 0);
                ctx.lineTo(4 * size, 2 * size);
                ctx.fill();
                
                ctx.fillStyle = theme.enemyDetail();
                ctx.fillRect(-6 * size, -4 * size, 3 * size, 8 * size);
                
                ctx.restore();
            }

            for (let e of explosions) {
                ctx.fillStyle = e.color ? e.color : (Math.random() > 0.5 ? theme.fg() : theme.trail()); 
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let en of enemies) {
                ctx.fillStyle = theme.enemy();
                
                if (en.type === 'drone') {
                    ctx.fillRect(en.x - 18, en.y - 9, 36, 18);
                    ctx.fillStyle = theme.enemyDetail();
                    ctx.fillRect(en.x - 21, en.y - 15, 9, 6);
                    ctx.fillRect(en.x + 12, en.y - 15, 9, 6);
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(en.x - 14, en.y - 3, 8, 6);
                
                } else if (en.type === 'infantry') {
                    ctx.fillStyle = theme.enemyDetail();
                    ctx.fillRect(en.x - 10, en.y - 36, 20, 22); 
                    ctx.fillStyle = theme.fg();
                    if (Math.floor(frameCount / 10) % 2 === 0 && gameState !== 'PAUSED') {
                        ctx.fillRect(en.x - 8, en.y - 14, 6, 14);
                        ctx.fillRect(en.x + 2, en.y - 14, 6, 14);
                    } else {
                        ctx.fillRect(en.x - 3, en.y - 14, 6, 14);
                    }
                    ctx.fillStyle = '#f00'; 
                    ctx.fillRect(en.x - 6, en.y - 30, 12, 4);
                } else if (en.type === 'tank') {
                    ctx.fillRect(en.x - 27, en.y - 18, 54, 18);
                    ctx.fillStyle = theme.enemyDetail();
                    ctx.fillRect(en.x - 12, en.y - 30, 24, 12);
                    ctx.strokeStyle = theme.enemy();
                    ctx.lineWidth = 4.5;
                    ctx.beginPath();
                    ctx.moveTo(en.x - 12, en.y - 24);
                    ctx.lineTo(en.x - 37.5, en.y - 24);
                    ctx.stroke();
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(en.x - 12, en.y - 22, 10, 4);
                } else if (en.type === 'mech') {
                    ctx.fillStyle = theme.enemyDetail();
                    ctx.fillRect(en.x - 21, en.y - 30, 42, 36); 
                    ctx.fillStyle = theme.fg();
                    if (Math.floor(frameCount / 15) % 2 === 0 && gameState !== 'PAUSED') {
                        ctx.fillRect(en.x - 15, en.y + 6, 9, 24);
                        ctx.fillRect(en.x + 6, en.y + 6, 9, 24);
                    } else {
                        ctx.fillRect(en.x - 12, en.y + 6, 9, 24);
                        ctx.fillRect(en.x + 3, en.y + 6, 9, 24);
                    }
                    ctx.fillStyle = theme.laser(); 
                    ctx.fillRect(en.x - 12, en.y - 18, 18, 6);
                    ctx.strokeStyle = theme.enemy();
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(en.x - 21, en.y - 12);
                    ctx.lineTo(en.x - 39, en.y);
                    ctx.stroke();
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(en.x - 12, en.y - 24, 18, 4);
                } else if (en.type === 'heli') {
                    ctx.fillRect(en.x - 15, en.y - 9, 30, 18);
                    ctx.fillRect(en.x + 15, en.y - 3, 21, 6);
                    ctx.fillStyle = theme.enemyDetail();
                    ctx.fillRect(en.x + 33, en.y - 9, 3, 12);
                    ctx.fillStyle = theme.enemy();
                    ctx.fillRect(en.x - 9, en.y - 15, 18, 6);
                    ctx.fillStyle = theme.enemyDetail();
                    if (Math.floor(frameCount / 3) % 2 === 0) {
                        ctx.fillRect(en.x - 27, en.y - 18, 54, 3);
                    } else {
                        ctx.fillRect(en.x - 18, en.y - 18, 36, 3);
                    }
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(en.x + 33, en.y - 9, 3, 12);
                } else if (en.type === 'bomber') {
                    ctx.beginPath();
                    ctx.moveTo(en.x - 30, en.y - 13); 
                    ctx.lineTo(en.x + 37.5, en.y);     
                    ctx.lineTo(en.x - 30, en.y + 13); 
                    ctx.lineTo(en.x - 15, en.y);     
                    ctx.fill();
                    ctx.fillStyle = theme.enemyDetail();
                    ctx.fillRect(en.x - 27, en.y - 3, 9, 6);
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(en.x - 25, en.y - 3, 8, 6);
                }

                if (en.isTargeted) {
                    let hitY = (['tank', 'infantry', 'mech'].includes(en.type)) ? en.y - en.height/2 : en.y;
                    let extX = en.width/2 + 5;
                    let extY = en.height/2 + 5;
                    ctx.strokeStyle = '#f00';
                    ctx.lineWidth = 2;
                    let c = 8;
                    
                    ctx.beginPath(); ctx.moveTo(en.x - extX, hitY - extY + c); ctx.lineTo(en.x - extX, hitY - extY); ctx.lineTo(en.x - extX + c, hitY - extY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(en.x + extX - c, hitY - extY); ctx.lineTo(en.x + extX, hitY - extY); ctx.lineTo(en.x + extX, hitY - extY + c); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(en.x - extX, hitY + extY - c); ctx.lineTo(en.x - extX, hitY + extY); ctx.lineTo(en.x - extX + c, hitY + extY); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(en.x + extX - c, hitY + extY); ctx.lineTo(en.x + extX, hitY + extY); ctx.lineTo(en.x + extX, hitY + extY - c); ctx.stroke();
                }
            }

            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
            }

            ctx.fillStyle = theme.fg();
            ctx.font = '36px "Courier New"';
            ctx.textAlign = 'center';
            if (gameMode === 'MAIN') {
                ctx.fillText(`LEVEL: ${level}/10`, width / 2, 45);
            } else {
                ctx.fillText(`ENDLESS WAVE: ${level}`, width / 2, 45);
                if (fleetReady > 0 && gameState === 'PLAYING') {
                    ctx.fillStyle = '#0af';
                    ctx.font = '20px "Courier New"';
                    ctx.fillText(`Fleet Ready: (E) Launch Command`, width / 2, 75);
                }
            }

            let controlsAlpha = 1.0;
            if (gameState === 'PLAYING' && !isIntermission) {
                if (levelFrames > 180) { 
                    controlsAlpha = Math.max(0, 1.0 - (levelFrames - 180) / 60);
                }
            } else if (gameState === 'PAUSED' || gameState === 'START_MENU') {
                controlsAlpha = 1.0;
            } else if (isIntermission || gameState === 'GAME_OVER' || gameState === 'GAME_CLEARED') {
                controlsAlpha = 0.0;
            }

            if (controlsAlpha > 0 && gameState !== 'START_MENU') {
                ctx.save();
                ctx.globalAlpha = controlsAlpha;
                ctx.fillStyle = theme.fg();
                ctx.font = '14px "Courier New"';
                ctx.textAlign = 'right';
                ctx.fillText(`[T] Theme: ${isDark ? 'DARK' : 'LIGHT'}`, width - 20, 65);
                if (gameMode === 'MAIN') {
                    ctx.fillText(`[1-3] or [Q] Weapon: ${activeWeapon.replace('_', ' ')}`, width - 20, 85);
                } else {
                    let wStr = activeWeapon === 'SWARM' ? 'SWARM ROCKET' : (activeWeapon === 'FLEET' ? 'DRONE FLEET' : 'STANDARD ROCKET');
                    ctx.fillStyle = activeWeapon === 'SWARM' ? '#f00' : (activeWeapon === 'FLEET' ? '#0af' : theme.fg());
                    ctx.fillText(`Weapon: ${wStr}`, width - 20, 85);
                    ctx.fillStyle = theme.fg();
                    ctx.fillText(`[Q] Equip Weapon - Swarm: ${swarmMissilesReady>0?'YES':'NO'} | Fleet: ${fleetReady>0?'YES':'NO'}`, width - 20, 105);
                    ctx.fillText(`[M] Mode: ${shootingMode}`, width - 20, 125);
                }
                ctx.fillText(`[P] Pause`, width - 20, gameMode === 'MAIN' ? 105 : 145);
                ctx.fillText(`[ESC] Abort to Menu`, width - 20, gameMode === 'MAIN' ? 125 : 165);
                ctx.restore();
            }

            if (gameState === 'START_MENU') {
                ctx.fillStyle = theme.overlay();
                ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = theme.fg();
                ctx.textAlign = 'center';
                ctx.font = '50px "Courier New"';
                ctx.fillText('MISSILE STRIKE', width / 2, height / 2 - 120);
                
                ctx.font = '20px "Courier New"';
                ctx.fillStyle = theme.trail();
